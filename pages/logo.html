<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Rajdhani:wght@300;400&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
    }

    canvas {
        display: block;
    }

    .title {
        text-align: center;
        letter-spacing: 0.35em;
        text-transform: uppercase;
    }

    .title h1 {
        font-size: 1.9rem;
        font-weight: 700;
        background: linear-gradient(135deg, #a8edff 0%, #ffffff 40%, #c2f0ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
    }

    .title p {
        font-family: 'Rajdhani', sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.5em;
        color: rgba(160, 220, 255, 0.45);
        margin-top: 8px;
        font-weight: 300;
    }

    .formula-label {
        font-family: 'Rajdhani', sans-serif;
        font-size: 0.68rem;
        color: rgba(100, 180, 240, 0.35);
        letter-spacing: 0.12em;
        text-align: center;
    }

    .formula-label span {
        color: rgba(140, 210, 255, 0.55);
    }
</style>
<div class="container">
    <canvas id="logo"></canvas>
</div>
<script>

    const SIZE = 64; // Change this single value to scale the entire logo
    const S = SIZE / 620;

    // Palette
    const C = {
        a1:  '#6366f1',               // indigo
        a1d: 'rgba(99, 102, 241, 0.35)',
        a2:  '#06b6d4',               // cyan
        a2d: 'rgba(6, 182, 212, 0.18)',
        a3:  '#22c55e',               // green
        a3d: 'rgba(34, 197, 94, 0.25)',
        ap:  '#a855f7',               // purple
        apd: 'rgba(168, 85, 247, 0.30)',
    };

    const canvas = document.getElementById('logo');
    canvas.width = SIZE;
    canvas.height = SIZE;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;

    let t = 0;

    function rosePetal(k, scale, steps = 2000) {
        const pts = [];
        for (let i = 0; i <= steps; i++) {
            const theta = (i / steps) * Math.PI * (k % 2 === 0 ? 2 : 1) * Math.PI;
            const r = Math.cos(k * theta) * scale;
            pts.push({ x: cx + r * Math.cos(theta), y: cy + r * Math.sin(theta) });
        }
        return pts;
    }

    function epitrochoid(R, r, d, scale, steps = 1500) {
        const pts = [];
        for (let i = 0; i <= steps; i++) {
            const theta = (i / steps) * Math.PI * 2 * lcm(R, r) / R;
            const x = cx + scale * ((R - r) * Math.cos(theta) + d * Math.cos((R - r) / r * theta));
            const y = cy + scale * ((R - r) * Math.sin(theta) - d * Math.sin((R - r) / r * theta));
            pts.push({ x, y });
        }
        return pts;
    }

    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
    function lcm(a, b) { return (a * b) / gcd(a, b); }

    function drawLinePath(pts, progress, lineWidth, color) {
        const end = Math.floor(pts.length * progress);
        if (end < 2) return;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < end; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.lineCap = 'round';
        ctx.stroke();
    }

    // Precompute curves (all radii scaled by S)
    const rose7 = rosePetal(7, 155 * S);
    const rose3 = rosePetal(3, 90 * S);
    const spiro = epitrochoid(7, 3, 3.5, 22 * S, 3000);
    const spiro2 = epitrochoid(5, 2, 2.5, 55 * S, 2000);

    function draw() {
        ctx.clearRect(0, 0, W, H);

        const speed = 0.004;
        t += speed;
        const progress = Math.min(1, t / 2);
        const rot = t * 0.12;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rot);
        ctx.translate(-cx, -cy);

        // Outermost ring
        ctx.beginPath();
        ctx.arc(cx, cy, 158 * S, 0, Math.PI * 2);
        ctx.strokeStyle = C.a2d;
        ctx.lineWidth = 18 * S;
        ctx.stroke();

        // Rose k=7 — cyan
        drawLinePath(rose7, progress, 1.5 * S, C.a2);

        // Rose k=3 — indigo
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(-rot * 1.6);
        ctx.translate(-cx, -cy);
        drawLinePath(rose3, progress, 1.2 * S, C.a1);
        ctx.restore();

        // Spirograph layer 1 — green
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rot * 0.5);
        ctx.translate(-cx, -cy);
        drawLinePath(spiro, progress, 1.0 * S, C.a3);
        ctx.restore();

        // Spirograph layer 2 — purple
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(-rot * 0.8);
        ctx.translate(-cx, -cy);
        drawLinePath(spiro2, progress, 0.9 * S, C.ap);
        ctx.restore();

        ctx.restore(); // end main rotation

        // Center orb
        const orb = ctx.createRadialGradient(cx, cy, 0, cx, cy, 22 * S);
        orb.addColorStop(0, 'rgba(220, 245, 255, 0.98)');
        orb.addColorStop(0.3, 'rgba(168, 85, 247, 0.6)');
        orb.addColorStop(1, 'rgba(99, 102, 241, 0)');
        ctx.beginPath();
        ctx.arc(cx, cy, 22 * S, 0, Math.PI * 2);
        ctx.fillStyle = orb;
        ctx.fill();

        // Tick marks around outer circle
        for (let i = 0; i < 72; i++) {
            const a = (i / 72) * Math.PI * 2;
            const len = (i % 9 === 0 ? 8 : i % 3 === 0 ? 4 : 2) * S;
            const r1 = 168 * S, r2 = r1 + len;
            ctx.beginPath();
            ctx.moveTo(cx + r1 * Math.cos(a), cy + r1 * Math.sin(a));
            ctx.lineTo(cx + r2 * Math.cos(a), cy + r2 * Math.sin(a));
            ctx.strokeStyle = i % 9 === 0 ? C.a1d : C.a2d;
            ctx.lineWidth = (i % 9 === 0 ? 1.2 : 0.6) * S;
            ctx.stroke();
        }

        requestAnimationFrame(draw);
    }

    draw();

</script>
