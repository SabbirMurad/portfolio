<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
     Indigo → cyan gradient (matches --a1 → --a2)
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

     Indigo → purple → cyan for text depth
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

     Ambient glow behind hexagon
    <radialGradient id="glow-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#08080f" stop-opacity="0"/>
    </radialGradient>

     Glow on hex border
    <filter id="hex-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

     Glow on text
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

     Soft glow on dots
    <filter id="dot-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

     Clip to hexagon
    <clipPath id="hex-clip">
      <polygon points="200,50 330,125 330,275 200,350 70,275 70,125"/>
    </clipPath>
  </defs>

   ── Ambient glow circle ──
  <ellipse cx="200" cy="200" rx="175" ry="175" fill="url(#glow-bg)"/>

   ── Hex fill (dark glass) ──
  <polygon
    points="200,50 330,125 330,275 200,350 70,275 70,125"
    fill="#0d0d1a"
    clip-path="url(#hex-clip)"
  />

   ── Inner subtle glass sheen ──
  <polygon
    points="200,50 330,125 330,275 200,350 70,275 70,125"
    fill="none"
    stroke="rgba(255,255,255,0.05)"
    stroke-width="1"
  />

   ── Hex border with gradient glow ──
  <polygon
    points="200,50 330,125 330,275 200,350 70,275 70,125"
    fill="none"
    stroke="url(#g1)"
    stroke-width="2.5"
    filter="url(#hex-glow)"
  />

   ── Constellation nodes on hex corners ──
  <circle cx="200" cy="50"  r="3" fill="#6366f1" opacity="0.7" filter="url(#dot-glow)"/>
  <circle cx="330" cy="125" r="3" fill="#8b8cf8" opacity="0.6" filter="url(#dot-glow)"/>
  <circle cx="330" cy="275" r="3" fill="#06b6d4" opacity="0.7" filter="url(#dot-glow)"/>
  <circle cx="200" cy="350" r="3" fill="#06b6d4" opacity="0.7" filter="url(#dot-glow)"/>
  <circle cx="70"  cy="275" r="3" fill="#8b8cf8" opacity="0.6" filter="url(#dot-glow)"/>
  <circle cx="70"  cy="125" r="3" fill="#6366f1" opacity="0.7" filter="url(#dot-glow)"/>

   ── "SH" initials ──
   Glow layer
  <text
    x="200" y="228"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Archivo', 'Arial Black', Impact, sans-serif"
    font-weight="900"
    font-size="118"
    letter-spacing="-6"
    fill="url(#g1)"
    opacity="0.35"
    filter="url(#text-glow)"
  >SH</text>
   Sharp layer
  <text
    x="200" y="228"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Archivo', 'Arial Black', Impact, sans-serif"
    font-weight="900"
    font-size="118"
    letter-spacing="-6"
    fill="url(#g2)"
  >SH</text>

   ── Accent dot (bottom-right, cyan pulse) ──
  <circle cx="315" cy="292" r="8" fill="#06b6d4" opacity="0.9" filter="url(#dot-glow)"/>
  <circle cx="315" cy="292" r="14" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
</svg>
