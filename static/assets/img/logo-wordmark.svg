<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" width="260" height="52">
  <defs>
    <linearGradient id="wg1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="wglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- "sabbir" in white-gray gradient -->
  <text
    x="0" y="38"
    font-family="'Archivo', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="36"
    letter-spacing="-1.5"
    fill="url(#wg1)"
  >sabbir</text>

  <!-- "hassan" in indigo→cyan gradient with glow -->
  <text
    x="148" y="38"
    font-family="'Archivo', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="36"
    letter-spacing="-1.5"
    fill="url(#wg2)"
    filter="url(#wglow)"
  >hassan</text>
</svg>
